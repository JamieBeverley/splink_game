<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#aa3bff"/>
  <!-- Left word-bar -->
  <rect x="2" y="13.5" width="11" height="5" rx="2.5" fill="white" opacity="0.75"/>
  <!-- Right word-bar -->
  <rect x="19" y="13.5" width="11" height="5" rx="2.5" fill="white" opacity="0.75"/>
  <!-- Center diamond: overlaps both bars, showing it connects them -->
